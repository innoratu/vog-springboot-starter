spring.application.name=vog-demo

# H2 in-memory database
spring.datasource.url=jdbc:h2:mem:vogdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# H2 web console (dev): http://localhost:8080/h2-console  (JDBC URL: jdbc:h2:mem:vogdb)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# springdoc / Swagger UI: http://localhost:8080/swagger-ui.html
springdoc.swagger-ui.path=/swagger-ui.html
