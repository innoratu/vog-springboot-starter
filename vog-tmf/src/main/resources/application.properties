spring.application.name=vog-tmf
server.port=8081

# H2 in-memory database
spring.datasource.url=jdbc:h2:mem:tmfdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# springdoc / Swagger UI: http://localhost:8081/swagger-ui.html
springdoc.swagger-ui.path=/swagger-ui.html

# Retrofit adapter: where the legacy (vog-demo) API lives
vog.legacy.base-url=http://localhost:8080
